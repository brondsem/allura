language: python
dist: bionic  # Ubuntu 18.04
jobs:
  include:
    - python: "2.7"
      env:
        - PY_LIB_DIR=/usr/lib/python2.7
        - PYSVN_PKG=python-svn
    - python: "3.7"
      env:
        - PY_LIB_DIR=/usr/lib/python3
        - PYSVN_PKG=python3-svn
before_install:
  - sudo apt-get install -qq $PYSVN_PKG libjpeg8-dev zlib1g-dev
# only works on stock python (2.7 or 3.5)
# virtualenv:
#  system_site_packages: true
install:
  - pip install -r requirements.txt
  - pip install https://sourceforge.net/projects/pysvn/files/pysvn/V1.9.12/pysvn-1.9.12.tar.gz/download
before_script:
  - ./rebuild-all.bash
  - npm install
script: ./run_tests
